version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: ads
      POSTGRES_USER: ads
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_DATABASE: ads
      DB_USERNAME: ads
      DB_PASSWORD: secret
      APP_ENV: local
      APP_DEBUG: 'true'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
