name: CI

on:
  push:
    branches: [ main, init-setup ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        run: |
          if [ -d frontend ]; then cd frontend && npm ci; fi

  php-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: php-actions/setup-php@v4
        with:
          php-version: '8.1'
      - name: Install composer deps
        run: |
          if [ -d backend ]; then composer --version || php -r "echo 'composer missing';"; fi
